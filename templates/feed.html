{% extends "base.html" %}
{% block body %}

<style>
    /* --- Main memory block styling --- */
    .memory-block {
        width: 100%;
        max-width: 1150px;
        margin: 0 auto 100px auto;
        color: white;
        font-size: 18px;
        line-height: 1.45;
        white-space: pre-line;
        overflow: hidden;
        transform: perspective(800px) rotateY(25deg) translateY(50px);
        transform-origin: left center;
        opacity: 0;
        transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 1s ease;
    }

    .memory-block.animate {
        transform: perspective(800px) rotateY(0deg) translateY(0);
        opacity: 1;
        filter: drop-shadow(0 0 25px rgba(255, 220, 130, 0.35));
    }

    /* --- Picture (image/video) styling --- */
    .picture {
        width: 220px;
        height: 220px;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 0 25px rgba(0, 0, 0, .45);
        cursor: pointer;
        transition: transform 0.6s ease, filter 0.6s ease;
    }

    .picture:hover {
        transform: scale(1.05) rotateZ(1deg);
        filter: brightness(1.15);
    }

    /* --- Text --- */
    .memory-text {
        display: block;
        margin-top: 0;
    }

    /* === Mobile Responsive === */
    @media(max-width:700px) {
        .picture {
            width: 120px;
            height: 120px;
            border-radius: 10px;
        }

        .memory-text {
            font-size: 15px;
            line-height: 1.4;
            text-align: justify;
        }

        .memory-left .picture {
            float: left;
            margin-right: 10px;
        }

        .memory-right .picture {
            float: right;
            margin-left: 10px;
        }

        .memory-block {
            margin-bottom: 60px;
        }
    }

    .like-heart {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 80px;
        color: #ff3b5c;
        opacity: 0;
        pointer-events: none;
    }

    .like-heart.show {
        animation: heartPop 0.6s ease forwards;
    }

    @keyframes heartPop {
        0% {
            transform: translate(-50%, -50%) scale(0.3);
            opacity: 0;
        }

        50% {
            transform: translate(-50%, -50%) scale(1.2);
            opacity: 1;
        }

        100% {
            transform: translate(-50%, -50%) scale(1);
            opacity: 0;
        }
    }

    .memory-block {
        position: relative;
    }

    #mediaModal {
        backdrop-filter: blur(4px);
    }
</style>

<audio id="scrollTick" src="{{ url_for('static', filename='sounds/tick.mp3') }}" preload="auto"></audio>
<div class="container py-5" style="max-width:1250px;margin:auto;">

    <div id="mediaModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);
display:none;justify-content:center;align-items:center;z-index:99999;">

        <span id="closeModal"
            style="position:absolute;top:25px;right:35px;font-size:40px;color:white;cursor:pointer;">✕</span>

        <img id="modalImg" style="max-width:95%;max-height:95%;display:none;cursor:zoom-in;">

        <video id="modalVideo" controls style="max-width:95%;max-height:95%;display:none;">
        </video>

    </div>
    {% if show_popup %}
    <div id="welcome-box"
        style="position: fixed; bottom: 18px; left: 18px; max-width: 240px; background: rgba(0,0,0,.68); color: white; padding: 18px 22px; border-radius: 14px; font-size: 19px; z-index: 9999; animation: slideIn .6s forwards, slideOut .6s forwards 2.6s;">
        Hi {{ firstname }}!<br><small>{{ quote }}</small>
    </div>

    <style>
        @keyframes slideIn {
            from {
                left: -250px;
                opacity: 0;
            }

            to {
                left: 18px;
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                left: 18px;
                opacity: 1;
            }

            to {
                left: 350px;
                opacity: 0;
            }
        }
    </style>
    {% endif %}

    {% for p in docs %}
    <div class="memory-block {% if loop.index0%2==0 %}memory-left{% else %}memory-right{% endif %}" style="clear:both;">
        {% if 'mp4' in p.url or 'webm' in p.url or 'mov' in p.url %}
        <video class="picture"
            style="{% if loop.index0%2==0 %}float:left;margin-right:40px;{% else %}float:right;margin-left:40px;{% endif %}"
            data-full="{{ p.url }}" src="{{ p.url|replace('/upload/','/upload/w_350,h_350,c_fill/') }}" controls
            loading="lazy"></video>
        {% else %}
        <img class="picture"
            style="{% if loop.index0%2==0 %}float:left;margin-right:40px;{% else %}float:right;margin-left:40px;{% endif %}"
            data-full="{{ p.url }}" src="{{ p.url|replace('/upload/','/upload/w_350,h_350,c_fill/') }}" loading="lazy">
        {% endif %}
        <div class="memory-text">{{ p.desc }}</div>
        <div style="clear:both"></div>
        <div class="like-heart">❤</div>
    </div>
    {% endfor %}
</div>

<!-- Feedback Box -->
<div id="feedback-box" style="display:none;margin-top:80px;">
    <form action="/feedback" method="POST">
        <textarea name="msg" placeholder="Feedback..."
            style="width:230px;height:70px;border-radius:8px;padding:8px;"></textarea>
        <button class="btn btn-primary btn-sm mt-2 w-100">Send</button>
    </form>

    <!-- Floating Feedback Button -->
    <button id="feedback-toggle" class="btn btn-outline-info rounded-circle"
        style="position:fixed;bottom:35px;right:35px;width:55px;height:55px;font-size:22px;z-index:9999;">
        💬
    </button>

    <script>
        const toggleBtn = document.getElementById("feedback-toggle");
        const box = document.getElementById("feedback-box");
        toggleBtn.addEventListener("click", () => {
            if (box.style.display === "block") {
                box.style.display = "none";
            } else {
                box.style.display = "block";
                box.style.position = "fixed";
                box.style.bottom = "100px";
                box.style.right = "35px";
                box.style.background = "rgba(0,0,0,0.7)";
                box.style.padding = "10px";
                box.style.borderRadius = "10px";
            }
        });
    </script>
</div>

<!-- Flip Scroll Animation -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("animate");
                } else {
                    entry.target.classList.remove("animate"); // makes it reanimate if you scroll up
                }
            });
        }, { threshold: 0.35 });

        document.querySelectorAll(".memory-block").forEach(block => observer.observe(block));
    });
</script>

<script>

    const modal = document.getElementById("mediaModal");
    const modalImg = document.getElementById("modalImg");
    const modalVideo = document.getElementById("modalVideo");
    const closeModal = document.getElementById("closeModal");

    let zoomLevel = 1;

    function zoomMedia(el, isVideo) {

        modal.style.display = "flex";

        if (isVideo) {

            modalVideo.src = el.dataset.full;
            modalVideo.style.display = "block";
            modalImg.style.display = "none";

        } else {

            modalImg.src = el.dataset.full;
            modalImg.style.display = "block";
            modalVideo.style.display = "none";

        }

    }
    closeModal.onclick = () => {

        modal.style.display = "none";

        modalVideo.pause();
        modalVideo.src = "";

    }

    modal.onclick = (e) => {

        if (e.target === modal) {

            modal.style.display = "none";

            modalVideo.pause();
            modalVideo.src = "";

        }

    }

    document.addEventListener("keydown", (e) => {

        if (e.key === "Escape") {

            modal.style.display = "none";

            modalVideo.pause();
            modalVideo.src = "";

        }

    });

</script>


<script>

    let lastScroll = 0;
    let lastPos = 0;
    let soundEnabled = false;

    const tick = document.getElementById("scrollTick");

    document.addEventListener("click", () => {
        soundEnabled = true;
    });

    window.addEventListener("scroll", () => {

        const now = Date.now();
        const pos = window.scrollY;

        const speed = Math.abs(pos - lastPos);

        let interval = 160;

        if (speed > 80) interval = 120;
        else if (speed > 40) interval = 200;

        if (now - lastScroll > interval) {

            if (soundEnabled) {
                tick.currentTime = 0;
                tick.volume = 0.06;
                tick.play().catch(() => { });
            }

            if (navigator.vibrate) {
                navigator.vibrate(4);
            }

            lastScroll = now;
            lastPos = pos;
        }

    });

</script>

<script>

    let clickTimer = null;
    let lastTap = 0;

    document.querySelectorAll(".picture").forEach(pic => {

        pic.addEventListener("click", function (e) {

            const now = Date.now();

            if (now - lastTap < 300) {

                clearTimeout(clickTimer);

                const heart = this.parentElement.querySelector(".like-heart");

                heart.classList.remove("show");
                void heart.offsetWidth;
                heart.classList.add("show");

                heartExplosion(this);

            } else {

                clickTimer = setTimeout(() => {
                    zoomMedia(this, this.tagName === "VIDEO");
                }, 250);

            }

            lastTap = now;

        });

    });

</script>
<script>
    function heartExplosion(el) {

        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        const particles = 80;

        for (let i = 0; i < particles; i++) {

            const h = document.createElement("div");
            h.innerHTML = "💗💞";

            h.style.position = "fixed";
            h.style.left = Math.random() * window.innerWidth + "px";
            h.style.top = Math.random() * window.innerHeight + "px";
            h.style.fontSize = (12 + Math.random() * 18) + "px";
            h.style.color = "pink";
            h.style.pointerEvents = "none";
            h.style.zIndex = "99999";

            document.body.appendChild(h);

            const x = cx - parseFloat(h.style.left);
            const y = cy - parseFloat(h.style.top);

            h.animate([
                { transform: "translate(0,0) scale(1)", opacity: 1 },
                { transform: `translate(${x}px,${y}px) scale(.6)`, opacity: 1 },
                { transform: `translate(${x}px,${y}px) scale(1.8)`, opacity: 0 }
            ], {
                duration: 1000,
                easing: "ease-out"
            });

            setTimeout(() => h.remove(), 1000);

        }

    }
</script>

{% endblock %}
